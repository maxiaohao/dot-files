#add_newline = false
# right_format disabled: PSReadLine on pwsh mis-measures the right-prompt width
# and the cursor drifts (need Ctrl-L to realign). Time is shown in the WezTerm
# bottom status bar instead.

# Default left format with $time relocated from after $line_break to just
# before it, so the timestamp sits at the end of the first prompt line
# instead of next to the prompt character on the second line.
format = """$username$hostname$localip$shlvl$singularity$kubernetes$directory\
$vcsh$fossil_branch$fossil_metrics$git_branch$git_commit$git_state$git_metrics$git_status\
$hg_branch$pijul_channel$docker_context$package\
$c$cmake$cobol$daml$dart$deno$dotnet$elixir$elm$erlang$fennel$gleam$golang$guix_shell\
$haskell$haxe$helm$java$julia$kotlin$gradle$lua$nim$nodejs$ocaml$opa$perl$php$pulumi\
$purescript$python$quarto$raku$rlang$red$ruby$rust$scala$solidity$swift$terraform$typst\
$vlang$vagrant$zig$buf$nix_shell$conda$meson$spack$memory_usage\
$aws$gcloud$openstack$azure$nats$direnv$env_var$crystal$custom$sudo$cmd_duration\
$time\
$line_break\
$jobs$battery$status$os$container$shell$character"""

#[character]
#disabled = false
#success_symbol = '[#](bold green)'
#error_symbol = '[#](bold red)'

[directory]
disabled = false
fish_style_pwd_dir_length = 3
truncation_length = 4
style = 'fg:#BBBBBB'
format = "[$path]($style)[$lock_symbol]($lock_style) "
read_only = " ¾░î¥"

[git_branch]
disabled = false
format = '[$symbol$branch(:$remote_branch)]($style) '
style = 'bold yellow'
symbol = "´Éİ "

[git_metrics]
disabled = true
format = '[+$added]($added_style)/[-$deleted]($deleted_style) '

[kubernetes]
disabled = false
format = '[$context( \($namespace\))]($style) '

[package]
disabled = true
format = '[$symbol$version]($style) '
symbol = "¾░Åù "

[status]
disabled = false
style = 'bg:blue'
symbol = '­şö┤ '
format = '[\[$symbol$common_meaning$signal_name$maybe_int\]]($style) '
map_symbol = true

[time]
disabled = false
style = 'fg:#555555'
format = '[\[$time\]]($style) '
time_format = '%F %r %Z'
#time_format = '%+'

[username]
disabled = false
style_user = 'white bold'
style_root = 'black bold'
format = '[$user]($style) '
show_always = false


