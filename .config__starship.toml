truncation_length = 4
style = 'fg:#BBBBBB'
format = "[$path]($style)[$lock_symbol]($lock_style) "
read_only = " ˇ░îż"

[git_branch]
disabled = false
format = '[$symbol$branch(:$remote_branch)]($style) '
style = 'bold yellow'
symbol = "´Éś "

